name: Benchmark

# Informational benchmark, never blocks merge. PR: diff vs main's baseline;
# push: publish the baseline + history. Uses `pull_request_target` (not
# `pull_request`) so the job runs in the base-repo context where the Azure
# secrets live — a fork `pull_request` run gets none. Fork code is gated on
# maintainer approval before secrets are exposed (see `is_fork_pr`).
on:
  push:
    branches: [main]
    # Only refresh the baseline when perf-relevant code lands. Doc/example/
    # binding-only merges can't move performance, so skip the VM spin-up.
    # (GitHub Actions ignores YAML anchors, so the list is repeated below.)
    paths:
      - "src/**"
      - "benches/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/bench.yml"
      - ".github/workflows/supertable-bench-azure.yml"
  pull_request_target:
    branches: [main]
    # Code/state changes only — never on label or comment activity.
    types: [opened, synchronize, reopened]
    # Same allowlist: skip the 4-VM bench on doc/example/binding-only PRs.
    paths:
      - "src/**"
      - "benches/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/bench.yml"
      - ".github/workflows/supertable-bench-azure.yml"

jobs:
  bench:
    strategy:
      fail-fast: false # one member failing must not cancel the other
      matrix:
        # One modality per leg, each on its own VM. `suffix` keeps per-leg
        # resources and comment markers unique (all legs share one run_id).
        include:
          - { bench: superfile,         docs: "1000000", suffix: sf }
          - { bench: supertable_fts,    docs: "1000000", suffix: st-fts }
          - { bench: supertable_vector, docs: "1000000", suffix: st-vec }
          - { bench: supertable_sql,    docs: "1000000", suffix: st-sql }
    # PR: new push cancels the in-flight run. main: serialize per bench so
    # concurrent merges don't race the baseline (never cancel).
    concurrency:
      group: bench-${{ github.event_name == 'push' && 'main' || github.event.pull_request.number }}-${{ matrix.bench }}
      cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write # post the bench-results comment on the PR
    uses: ./.github/workflows/supertable-bench-azure.yml
    with:
      bench: ${{ matrix.bench }}
      docs: ${{ matrix.docs }}
      ref: ${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}
      name_suffix: -${{ matrix.suffix }}
      update_baseline: ${{ github.event_name == 'push' }}
      pr_number: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || '' }}
      # Fork PR ⇒ gate on maintainer approval before secrets are exposed.
      is_fork_pr: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit
